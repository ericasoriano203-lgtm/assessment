<div class="col-md-4 offset-md-4">
<h3> Update Subscriber </h3>
<form (ngSubmit) = "onSubmit()">

    <div class="form-group">
        <label>Phone Number</label>
        <input type="number" class="form-control" id="phoneNumber"
            [(ngModel)] = "subscriber.phoneNumber" name="phoneNumber">
    </div>

    <div class="form-group">
        <label>User Name</label>
        <input type="number" class="form-control" id="userName"
            [(ngModel)] = "subscriber.userName" name="userName">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="password"
            [(ngModel)] = "subscriber.password" name="password">
    </div>

    <div class="form-group">
        <label>Domain</label>
        <input type="text" class="form-control" id="domain"
            [(ngModel)] = "subscriber.domain" name="domain">
    </div>

    <div class="form-group">
        <label>Status</label>
        <input type="text" class="form-control" id="status"
            [(ngModel)] = "subscriber.status" name="status">
    </div>

    <div class="form-group">
        <label>Call Forwarding (No Reply) - Provisioned </label>
        <input type="text" class="form-control" id="provisioned"
            [(ngModel)] = "subscriber.features.callForwardNoReply.provisioned" name="provisioned">
    </div>

        <div class="form-group">
        <label>Call Forwarding (No Reply) - Destination </label>
        <input type="text" class="form-control" id="destination"
            [(ngModel)] = "subscriber.features.callForwardNoReply.destination" name="destination">
    </div>

    <div>
        <button class = "btn btn-success" type="submit">Submit</button>
    </div>

</form>
</div>
